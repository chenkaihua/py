name: Hello World Workflow

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Run a one-line script
      env:
        # 从 GitHub Secrets 读取敏感信息（需先在仓库设置中配置）
        SMTP_SERVER: ${{ secrets.SMTP_SERVER }}       # SMTP 服务器（如 smtp.qq.com）
        SMTP_PORT: ${{ secrets.SMTP_PORT }}           # SMTP 端口（如 587）
        SMTP_USER: ${{ secrets.SMTP_USER }}           # 发件人邮箱
        SMTP_PASS: ${{ secrets.SMTP_PASS }}           # 邮箱授权码（非登录密码）
        EMAIL_TO: ${{ secrets.EMAIL_TO }}             # 收件人邮箱
      run: |
        sudo apt-get update
        sudo apt-get install -y s-nail 
        #sudo apt-get calibre ca-certificates
        curl -L -o economist.recipe https://raw.githubusercontent.com/kovidgoyal/calibre/master/recipes/economist.recipe
        ls -l economist.recipe
        #ebook-convert economist.recipe te`date '+%Y%m%d'`.epub --output-profile kindle
        echo "download te file!\n"
        # 核心：用 printf 写入 .mailrc 配置，无 EOF 语法问题
        printf "set from=\"%s <%s>\"\n\
          set smtp=smtp://%s:%s\n\
          set smtp-auth=login\n\
          set smtp-auth-user=%s\n\
          set smtp-auth-password=%s\n\
          "$EMAIL_FROM" "$SMTP_USER" "$SMTP_SERVER" "$SMTP_PORT" "$SMTP_USER" "$SMTP_PASS" > ~/.mailrc

        # 验证配置文件是否正确生成（可选，便于排查）
        echo "=== .mailrc 配置内容 ==="
        cat ~/.mailrc
        echo "=========================="
        echo "hello world!" | s-nail -v -s "te`date '+%Y%m%d'`" kaihua.chen@outlook.com
        echo "\n email sent!"
        
