name: Hello World Workflow

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Run a one-line script
      run: |
        echo "Hello, world!"
        sudo apt-get update
        sudo apt-get install -y s-nail calibre
        ebook-convert https://github.com/kovidgoyal/calibre/blob/master/recipes/economist.recipe ~/te`date '+%Y%m%d'`.epub --output-profile kindle
        echo "download te file!"
