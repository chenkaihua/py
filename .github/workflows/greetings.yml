name: Hello World Workflow

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Run a one-line script
      env:
        SMTP_SERVER: ${{ secrets.SMTP_SERVER }}       # SMTP 服务器（如 smtp.qq.com）
        SMTP_PORT: ${{ secrets.SMTP_PORT }}           # SMTP 端口（如 587）
        SMTP_USER: ${{ secrets.SMTP_USER }}           # 发件人邮箱
        SMTP_PASS: ${{ secrets.SMTP_PASS }}           # 邮箱授权码（非登录密码）
        EMAIL_TO: ${{ secrets.EMAIL_TO }}             # 收件人邮箱
      run: |
        sudo apt-get update
        sudo apt-get install -y s-nail ca-certificates wget
        sudo apt-get install -y libegl1 libopengl0 libxcb-cursor0 xdg-utils
        sudo -v && wget -nv -O- https://download.calibre-ebook.com/linux-installer.sh | sudo sh /dev/stdin
        # 下载并修改参数
        curl -L -o magazine.recipe https://raw.githubusercontent.com/kovidgoyal/calibre/master/recipes/bbc.recipe
        ls -l magazine.recipe
        #sed -i 's/^[[:space:]]*browser_type = '\''webengine'\''/#&/' magazine.recipe
        grep browser_type magazine.recipe   
        
        ebook-convert magazine.recipe ~/te`date '+%Y%m%d'`.epub --output-profile kindle -v
        echo "download te file!\n"
        
        cat <<EOF > ~/.mailrc
        set from=$SMTP_USER
        set smtp="smtps://smtp.qq.com:465"
        set smtp-auth=login
        set smtp-auth-user=$SMTP_USER
        set smtp-auth-password=$SMTP_PASS
        EOF

        # 验证配置文件是否正确生成（可选，便于排查）
        echo "=== .mailrc 配置内容 ==="
        cat ~/.mailrc
        echo "=========================="
        
        echo "hello world!" | s-nail -v -a te`date '+%Y%m%d'`.epub -s ~/"te`date '+%Y%m%d'`" kaihua.chen_mbp7Gq@kindle.com
        echo "\n email sent!"
        
